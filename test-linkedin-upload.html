<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste LinkedIn Upload</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #1f2937; margin-bottom: 30px; }
    .upload-box { background: white; border: 2px dashed #d1d5db; border-radius: 8px; padding: 40px; text-align: center; margin-bottom: 30px; cursor: pointer; }
    .upload-box:hover { border-color: #ff6400; background: #fef8f1; }
    input[type="file"] { display: none; }
    button { background: #ff6400; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button:hover { background: #e55c00; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 8px; border-left: 4px solid #ff6400; }
    .stat-card h3 { font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 10px; }
    .stat-card p { font-size: 28px; font-weight: bold; color: #1f2937; }
    .details { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    .details h2 { font-size: 16px; margin-bottom: 15px; color: #1f2937; }
    .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
    .detail-item { padding: 10px; background: #f9fafb; border-radius: 4px; }
    .detail-label { font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 5px; }
    .detail-value { font-size: 18px; font-weight: bold; color: #1f2937; }
    .error { background: #fee; color: #c00; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste LinkedIn Upload</h1>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <p>Arraste um arquivo de post LinkedIn (.xlsx) aqui ou clique para selecionar</p>
    </div>

    <div id="error" class="error" style="display: none;"></div>
    <div id="success" class="success" style="display: none;"></div>

    <div id="results" style="display: none;">
      <div class="stats">
        <div class="stat-card">
          <h3>Data</h3>
          <p id="postDate">-</p>
        </div>
        <div class="stat-card">
          <h3>Maior ER</h3>
          <p id="maxER">0%</p>
        </div>
        <div class="stat-card">
          <h3>Engajamento</h3>
          <p id="engagement">0</p>
        </div>
      </div>

      <div class="details">
        <h2>📊 Métricas Detalhadas</h2>
        <div class="detail-row">
          <div class="detail-item">
            <div class="detail-label">Impressões</div>
            <div class="detail-value" id="impressions">0</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Alcance</div>
            <div class="detail-value" id="reach">0</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-item">
            <div class="detail-label">Reações</div>
            <div class="detail-value" id="reactions">0</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Comentários</div>
            <div class="detail-value" id="comments">0</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-item">
            <div class="detail-label">Compartilhamentos</div>
            <div class="detail-value" id="shares">0</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Salvamentos</div>
            <div class="detail-value" id="saves">0</div>
          </div>
        </div>

        <div style="margin-top: 20px; padding: 15px; background: #f0f9ff; border-radius: 4px; border-left: 4px solid #0284c7;">
          <p style="font-size: 14px; color: #0c4a6e;">
            <strong>URL:</strong> <span id="postUrl" style="word-break: break-all;">-</span>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.style.display = 'none';
      success.style.display = 'none';

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const workbook = XLSX.read(event.target.result, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];

          // Parse LinkedIn individual post format
          const getCell = (addr) => {
            const cell = sheet[addr];
            return cell ? cell.v : null;
          };

          const url = getCell('B1') || 'Link não disponível';
          const dataText = getCell('B2');
          const impressoes = parseInt(getCell('B6')) || 0;
          const alcance = parseInt(getCell('B7')) || 0;
          const reacoes = parseInt(getCell('B10')) || 0;
          const comentarios = parseInt(getCell('B11')) || 0;
          const compartilhamentos = parseInt(getCell('B12')) || 0;
          const salvamentos = parseInt(getCell('B13')) || 0;

          const engajamento = reacoes + comentarios + compartilhamentos + salvamentos;
          const base = alcance > 0 ? alcance : impressoes;
          const er = base > 0 ? ((engajamento / base) * 100).toFixed(2) : 0;

          // Display results
          document.getElementById('postDate').textContent = dataText || '-';
          document.getElementById('maxER').textContent = er + '%';
          document.getElementById('engagement').textContent = engajamento;
          document.getElementById('impressions').textContent = impressoes.toLocaleString();
          document.getElementById('reach').textContent = alcance.toLocaleString();
          document.getElementById('reactions').textContent = reacoes;
          document.getElementById('comments').textContent = comentarios;
          document.getElementById('shares').textContent = compartilhamentos;
          document.getElementById('saves').textContent = salvamentos;
          document.getElementById('postUrl').textContent = url;

          document.getElementById('results').style.display = 'block';
          success.innerHTML = '✅ Arquivo processado com sucesso!';
          success.style.display = 'block';
        } catch (err) {
          error.textContent = '❌ Erro: ' + err.message;
          error.style.display = 'block';
        }
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
