<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo PostAnalyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #1f2937; margin-bottom: 30px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 8px; border-left: 4px solid #ff6400; }
    .stat-card h3 { font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 10px; }
    .stat-card p { font-size: 28px; font-weight: bold; color: #1f2937; }
    table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
    th { background: #ff6400; color: white; padding: 12px; text-align: left; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
    tr:hover { background: #f9fafb; }
    tr.max-er { background: #fef3e8; }
    .er-high { color: #ff6400; font-weight: bold; }
    button { background: #ff6400; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
    button:hover { background: #e55c00; }
    .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Demo PostAnalyzer - Dados de Teste</h1>

    <div id="results">
      <div class="success">✅ Dados de teste carregados com sucesso!</div>

      <div class="stats">
        <div class="stat-card">
          <h3>Posts Analisados</h3>
          <p id="postCount">0</p>
        </div>
        <div class="stat-card">
          <h3>Maior ER</h3>
          <p id="maxER">0%</p>
        </div>
        <div class="stat-card">
          <h3>Período</h3>
          <p id="period">-</p>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Título</th>
            <th style="width: 100px;">ER %</th>
            <th style="width: 120px;">Alcance</th>
            <th style="width: 120px;">Interações</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <button onclick="generatePDF()">📥 Gerar Relatório PDF</button>
    </div>
  </div>

  <script>
    let parsedData = null;

    // Test data embedded directly
    const testData = [
      {
        Data: '2026-04-01',
        Título: 'Primeiro post sobre conteúdo criativo',
        Curtidas: 150,
        Comentários: 25,
        Compartilhamentos: 12,
        Salvamentos: 45,
        Alcance: 3200,
        'URL do Post': 'https://instagram.com/p/abc123'
      },
      {
        Data: '2026-04-02',
        Título: 'Dicas para melhorar engagement nas redes sociais',
        Curtidas: 280,
        Comentários: 52,
        Compartilhamentos: 35,
        Salvamentos: 120,
        Alcance: 5100,
        'URL do Post': 'https://instagram.com/p/def456'
      },
      {
        Data: '2026-04-03',
        Título: 'Análise de tendências de mercado Q2 2026',
        Curtidas: 195,
        Comentários: 38,
        Compartilhamentos: 22,
        Salvamentos: 85,
        Alcance: 4200,
        'URL do Post': 'https://instagram.com/p/ghi789'
      },
      {
        Data: '2026-04-05',
        Título: 'Ferramentas essenciais para criadores de conteúdo',
        Curtidas: 420,
        Comentários: 95,
        Compartilhamentos: 68,
        Salvamentos: 245,
        Alcance: 8900,
        'URL do Post': 'https://instagram.com/p/jkl012'
      },
      {
        Data: '2026-04-07',
        Título: 'Webinar: Estratégia de conteúdo para 2026',
        Curtidas: 320,
        Comentários: 72,
        Compartilhamentos: 48,
        Salvamentos: 180,
        Alcance: 6800,
        'URL do Post': 'https://instagram.com/p/mno345'
      }
    ];

    // Process test data
    function processTestData() {
      const period = '2026-04';
      const posts = testData.map(row => {
        const interacoes = (row.Curtidas || 0) + (row.Comentários || 0) +
                          (row.Compartilhamentos || 0) + (row.Salvamentos || 0);
        const alcance = row.Alcance || 0;
        const er = alcance > 0 ? ((interacoes / alcance) * 100).toFixed(2) : 0;

        return {
          data: row.Data,
          titulo: row.Título,
          er: parseFloat(er),
          alcance: alcance,
          interacoes: interacoes,
          link: row['URL do Post']
        };
      }).sort((a, b) => b.er - a.er);

      parsedData = {
        posts,
        period,
        maxER: Math.max(...posts.map(p => p.er))
      };

      // Display results
      document.getElementById('postCount').textContent = posts.length;
      document.getElementById('maxER').textContent = parsedData.maxER.toFixed(2) + '%';
      document.getElementById('period').textContent = period;

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = posts.map(post => `
        <tr class="${post.er === parsedData.maxER ? 'max-er' : ''}">
          <td>${post.data}</td>
          <td>${post.titulo.substring(0, 50)}</td>
          <td class="${post.er === parsedData.maxER ? 'er-high' : ''}">${post.er}%</td>
          <td>${post.alcance.toLocaleString()}</td>
          <td>${post.interacoes}</td>
        </tr>
      `).join('');
    }

    function generatePDF() {
      if (!parsedData || parsedData.posts.length === 0) return;

      const jsPDFLib = window.jspdf ? window.jspdf.jsPDF : window.jsPDF;
      if (!jsPDFLib) {
        alert('Erro: biblioteca jsPDF nao carregou. Tente novamente.');
        return;
      }

      const doc = new jsPDFLib();
      const pageHeight = doc.internal.pageSize.getHeight();
      let currentY = 20;

      doc.setFontSize(18);
      doc.text('Performance Individual de Posts', 20, currentY);
      currentY += 15;

      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      doc.text('Plataforma: INSTAGRAM | Periodo: ' + parsedData.period, 20, currentY);
      currentY += 15;

      doc.setFontSize(9);
      doc.setTextColor(0, 0, 0);
      doc.text('Posts Analisados: ' + parsedData.posts.length, 20, currentY);
      currentY += 6;
      doc.text('Maior ER: ' + parsedData.maxER.toFixed(2) + '%', 20, currentY);
      currentY += 12;

      const cols = [20, 70, 20, 30, 25];
      const colX = [15, 40, 115, 140, 175];
      const rowHeight = 8;

      doc.setFillColor(255, 100, 0);
      doc.setTextColor(255, 255, 255);
      doc.setFont(undefined, 'bold');
      doc.setFontSize(9);

      const headers = ['Data', 'Titulo/Tema', 'ER %', 'Alcance', 'Interacoes'];
      for (let i = 0; i < headers.length; i++) {
        doc.text(headers[i], colX[i], currentY, { maxWidth: cols[i] - 2 });
      }
      currentY += rowHeight + 2;

      doc.setTextColor(0, 0, 0);
      doc.setFont(undefined, 'normal');

      for (let idx = 0; idx < parsedData.posts.length; idx++) {
        const post = parsedData.posts[idx];

        if (currentY > pageHeight - 20) {
          doc.addPage();
          currentY = 20;
        }

        const isMax = post.er === parsedData.maxER;
        if (isMax) {
          doc.setFillColor(255, 240, 220);
          doc.rect(15, currentY - 6, 165, rowHeight, 'F');
        }

        if (isMax) {
          doc.setTextColor(255, 100, 0);
          doc.setFont(undefined, 'bold');
        }

        const rowData = [
          post.data,
          post.titulo.substring(0, 45),
          post.er + '%',
          post.alcance.toLocaleString(),
          post.interacoes.toString()
        ];

        for (let i = 0; i < rowData.length; i++) {
          doc.text(String(rowData[i]), colX[i], currentY, { maxWidth: cols[i] - 2 });
        }

        if (isMax) {
          doc.setTextColor(0, 0, 0);
          doc.setFont(undefined, 'normal');
        }

        currentY += rowHeight;
      }

      doc.setFontSize(8);
      doc.setTextColor(150, 150, 150);
      const dateStr = new Date().toLocaleDateString('pt-BR');
      doc.text('Gerado em ' + dateStr, 15, pageHeight - 10);

      doc.save('Performance_instagram_' + parsedData.period + '.pdf');
    }

    // Run on page load
    window.addEventListener('load', () => {
      processTestData();
    });
  </script>
</body>
</html>
